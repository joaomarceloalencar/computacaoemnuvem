---
# Playbook principal — associa cada grupo de instâncias à sua role.
#
# Os grupos tag_Name_InstanciaNginx e tag_Name_InstanciaMySql são gerados
# automaticamente pelo inventário dinâmico a partir das tags das instâncias
# criadas pelo Terraform.
#
# Execução:
#   ansible-playbook -i aws_ec2.yaml playbook.yml

- hosts: tag_Name_InstanciaNginx
  roles:
    - web

- hosts: tag_Name_InstanciaMySql
  roles:
    - bancodedados
